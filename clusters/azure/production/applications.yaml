---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: base-applications
  namespace: monitoring
spec:
  interval: 5m
  path: ./applications
  prune: true
  sourceRef:
    kind: GitRepository
    name: monitoring-flux-infra
    namespace: monitoring
  postBuild:
    substitute:
      KUBE_PROMETHEUS_STACK_VERSION: "75.6.0"
      LOKI_STACK_VERSION: "6.30.0"
