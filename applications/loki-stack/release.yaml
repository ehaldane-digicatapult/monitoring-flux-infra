---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: loki
  namespace: monitoring
spec:
  chart:
    spec:
      chart: loki
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: monitoring
      # version: "6.30.0"
      version: ${LOKI_STACK_VERSION}
  install:
    remediation:
      retries: -1
    crds: Create
  interval: 10m
  upgrade:
    remediation:
      retries: -1
    crds: CreateReplace
  valuesFrom:
    - kind: ConfigMap
      name: base-values
      valuesKey: loki-values.yaml
    - kind: ConfigMap
      name: env-values
      valuesKey: loki-values.yaml
