# https://github.com/grafana/helm-charts/tree/main/charts/loki-stack
backend:
  replicas: 0
chunksCache:
  allocatedMemory: 2048
deploymentMode: SingleBinary
loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  schemaConfig:
    configs:
      - from: 2024-04-01
        index:
          prefix: index_
          period: 24h
        object_store: filesystem
        schema: v13
        store: tsdb
  storage:
    type: "filesystem"
read:
  replicas: 0
singleBinary:
  replicas: 1
write:
  replicas: 0
